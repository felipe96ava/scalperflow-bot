name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Verify version matches tag
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}".TrimStart('v')
          $code = Select-String -Path version.py -Pattern '__version__\s*=\s*"([^"]+)"' | ForEach-Object { $_.Matches[0].Groups[1].Value }
          if ($tag -ne $code) {
            Write-Error "Tag ($tag) nao bate com __version__ ($code) em version.py"
            exit 1
          }
          Write-Host "Versao validada: $tag"

      - name: Sanity check — no credenciais embutidas
        shell: pwsh
        run: |
          if (Test-Path config.py) {
            Write-Error "config.py nao deveria estar no repo (esta no .gitignore)"
            exit 1
          }
          if (Test-Path gui_config.json) {
            Write-Error "gui_config.json nao deveria estar no repo (esta no .gitignore)"
            exit 1
          }

      - name: Build .exe (GUI via .spec)
        run: pyinstaller ScalperFlowBot.spec --noconfirm

      - name: Verify build output
        shell: pwsh
        run: |
          if (-not (Test-Path dist/ScalperFlowBot.exe)) {
            Write-Error "Build falhou: dist/ScalperFlowBot.exe nao encontrado"
            exit 1
          }
          $size = (Get-Item dist/ScalperFlowBot.exe).Length / 1MB
          Write-Host ("Build OK: dist/ScalperFlowBot.exe ({0:N1} MB)" -f $size)

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: ScalperFlow ${{ github.ref_name }}
          generate_release_notes: true
          files: dist/ScalperFlowBot.exe
